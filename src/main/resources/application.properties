# =============================================
# Keycloak / OIDC
# =============================================

quarkus.oidc.enabled=true

quarkus.oidc.auth-server-url=http://localhost:8180/realms/venda-pamonhas
quarkus.oidc.client-id=venda-pamonhas-api
quarkus.oidc.credentials.secret=OcL8kOstArIAD2oPlYeEbCMgL5i7EHuW
quarkus.oidc.application-type=service

# Mapeamento de roles e principal vindos do token do Keycloak
quarkus.oidc.roles.role-claim-path=realm_access/roles
quarkus.oidc.token.principal-claim=email

quarkus.smallrye-openapi.security-scheme=oidc
quarkus.swagger-ui.oauth-client-id=venda-pamonhas-api

# Keycloak Admin API (usada para registrar/atualizar usuários)
keycloak.admin.base-url=http://localhost:8180
keycloak.admin.realm=venda-pamonhas
keycloak.admin.client-id=admin-cli
keycloak.admin.username=admin
keycloak.admin.password=admin
keycloak.admin.client-secret=OcL8kOstArIAD2oPlYeEbCMgL5i7EHuW

