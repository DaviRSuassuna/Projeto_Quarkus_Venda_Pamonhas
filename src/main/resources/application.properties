# configuracao do bd
quarkus.datasource.db-kind = postgresql
quarkus.datasource.username = topicos1
quarkus.datasource.password = 123456
quarkus.datasource.jdbc.url = jdbc:postgresql://localhost:5432/topicos1db

# desabilitar o docker 
quarkus.devservices.enabled=false

quarkus.hibernate-orm.database.generation=drop-and-create
# quarkus.hibernate-orm.database.generation=none
# quarkus.hibernate-orm.database.generation=update

quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-parameters=true

# JWT (smallrye-jwt)
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=venda-pamonhas-api
smallrye.jwt.sign.key.location=META-INF/resources/privateKey.pem

# =============================================
# Keycloak / OIDC
# =============================================

# Desabilitar OIDC por padrão para não quebrar o startup sem Keycloak rodando
quarkus.oidc.enabled=false

# Configurações do realm (ajustar quando Keycloak estiver rodando)
quarkus.oidc.auth-server-url=http://localhost:8180/realms/venda-pamonhas
quarkus.oidc.client-id=venda-pamonhas-api
quarkus.oidc.credentials.secret=OcL8kOstArIAD2oPlYeEbCMgL5i7EHuW
quarkus.oidc.application-type=service

# Keycloak Admin API (usada para registrar/atualizar usuários)
keycloak.admin.base-url=http://localhost:8180
keycloak.admin.realm=venda-pamonhas
keycloak.admin.client-id=admin-cli
keycloak.admin.username=admin
keycloak.admin.password=admin